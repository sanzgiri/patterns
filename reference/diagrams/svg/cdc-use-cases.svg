		.d2-3241828699 .color-AB5{color:#F7F8FE;}.appendix text.text{fill:#0A0F25}.md{--color-fg-default:#0A0F25;--color-fg-muted:#676C7E;--color-fg-subtle:#9499AB;--color-canvas-default:#FFFFFF;--color-canvas-subtle:#EEF1F8;--color-border-default:#0D32B2;--color-border-muted:#0D32B2;--color-neutral-muted:#EEF1F8;--color-accent-fg:#0D32B2;--color-accent-emphasis:#0D32B2;--color-attention-subtle:#676C7E;--color-danger-fg:red;}.sketch-overlay-B1{fill:url(#streaks-darker-d2-3241828699);mix-blend-mode:lighten}.sketch-overlay-B2{fill:url(#streaks-darker-d2-3241828699);mix-blend-mode:lighten}.sketch-overlay-B3{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-B4{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-B5{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-B6{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-AA2{fill:url(#streaks-dark-d2-3241828699);mix-blend-mode:overlay}.sketch-overlay-AA4{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-AA5{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-AB4{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-AB5{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-N1{fill:url(#streaks-darker-d2-3241828699);mix-blend-mode:lighten}.sketch-overlay-N2{fill:url(#streaks-dark-d2-3241828699);mix-blend-mode:overlay}.sketch-overlay-N3{fill:url(#streaks-normal-d2-3241828699);mix-blend-mode:color-burn}.sketch-overlay-N4{fill:url(#streaks-normal-d2-3241828699);mix-blend-mode:color-burn}.sketch-overlay-N5{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-N6{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.sketch-overlay-N7{fill:url(#streaks-bright-d2-3241828699);mix-blend-mode:darken}.light-code{display: block}.dark-code{display: none}]]></style><g class="VUMx"><g class="shape" ><rect x="0.000000" y="0.000000" width="549.000000" height="114.000000" rx="8.000000" stroke="#0d47a1" fill="#bbdefb" style="stroke-width:2;" /></g><text x="274.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="274.500000" dy="0.000000">1. SEARCH INDEX SYNC</tspan><tspan x="274.500000" dy="17.250000">   Source DB has orders; Elasticsearch needs to mirror them.</tspan><tspan x="274.500000" dy="17.250000">   CDC streams every change u2192 indexer updates ES in near real time.</tspan><tspan x="274.500000" dy="17.250000">   No dual-write; no full re-indexing.</tspan></text></g><g class="VUMy"><g class="shape" ><rect x="609.000000" y="8.000000" width="569.000000" height="98.000000" rx="8.000000" stroke="#1b5e20" fill="#c8e6c9" style="stroke-width:2;" /></g><text x="893.500000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="893.500000" dy="0.000000">2. CACHE INVALIDATION</tspan><tspan x="893.500000" dy="17.666667">   CDC stream tells the cache layer &#39;customer 42 changed&#39; u2192 invalidate.</tspan><tspan x="893.500000" dy="17.666667">   Eliminates stale-cache bugs from missed invalidations.</tspan></text></g><g class="VUMz"><g class="shape" ><rect x="1238.000000" y="0.000000" width="515.000000" height="114.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="1495.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1495.500000" dy="0.000000">3. EVENT-DRIVEN MICROSERVICES (Outbox CDC variant)</tspan><tspan x="1495.500000" dy="17.250000">   Service writes to outbox table; Debezium picks it up u2192 Kafka.</tspan><tspan x="1495.500000" dy="17.250000">   Lower-latency alternative to Polling Publisher.</tspan><tspan x="1495.500000" dy="17.250000">   This is the most-cited modern CDC use case.</tspan></text></g><g class="VUM0"><g class="shape" ><rect x="1813.000000" y="0.000000" width="545.000000" height="114.000000" rx="8.000000" stroke="#4a148c" fill="#e1bee7" style="stroke-width:2;" /></g><text x="2085.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="2085.500000" dy="0.000000">4. DATA LAKE / WAREHOUSE INGESTION</tspan><tspan x="2085.500000" dy="17.250000">   Replicate operational DB into S3 / Snowflake / BigQuery as it changes.</tspan><tspan x="2085.500000" dy="17.250000">   Replaces nightly batch ETL with near-real-time pipelines.</tspan><tspan x="2085.500000" dy="17.250000">   Fivetran, Airbyte, Debezium are common implementations.</tspan></text></g><g class="VUM1"><g class="shape" ><rect x="2418.000000" y="8.000000" width="543.000000" height="98.000000" rx="8.000000" stroke="#e65100" fill="#ffe0b2" style="stroke-width:2;" /></g><text x="2689.500000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="2689.500000" dy="0.000000">5. DATABASE MIGRATION</tspan><tspan x="2689.500000" dy="17.666667">   Mirror legacy DB u2192 new DB via CDC; cut over when caught up.</tspan><tspan x="2689.500000" dy="17.666667">   Used by AWS DMS, GoldenGate, Striim for zero-downtime migrations.</tspan></text></g><g class="VUM2"><g class="shape" ><rect x="3021.000000" y="8.000000" width="627.000000" height="98.000000" rx="8.000000" stroke="#3e2723" fill="#d7ccc8" style="stroke-width:2;" /></g><text x="3334.500000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="3334.500000" dy="0.000000">6. AUDIT LOGGING</tspan><tspan x="3334.500000" dy="17.666667">   Stream all changes to an immutable audit log (Kafka with infinite retention).</tspan><tspan x="3334.500000" dy="17.666667">   Satisfies SOC 2 / HIPAA / SOX &#39;change history&#39; requirements without app changes.</tspan></text></g><g class="VUM3"><g class="shape" ><rect x="3708.000000" y="0.000000" width="570.000000" height="114.000000" rx="8.000000" stroke="#004d40" fill="#b2dfdb" style="stroke-width:2;" /></g><text x="3993.000000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="3993.000000" dy="0.000000">7. EVENT SOURCING BOOTSTRAP</tspan><tspan x="3993.000000" dy="17.250000">   Start with a normal CRUD app + CDC u2192 events to Kafka.</tspan><tspan x="3993.000000" dy="17.250000">   New event-sourced services consume those events as the source of truth.</tspan><tspan x="3993.000000" dy="17.250000">   Gradual migration without rewrite.</tspan></text></g><g class="VUM4"><g class="shape" ><rect x="4338.000000" y="8.000000" width="540.000000" height="98.000000" rx="8.000000" stroke="#263238" fill="#cfd8dc" style="stroke-width:2;" /></g><text x="4608.000000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="4608.000000" dy="0.000000">8. CROSS-REGION REPLICATION</tspan><tspan x="4608.000000" dy="17.666667">   CDC stream into Kafka; another region consumes u2192 mirrored DB.</tspan><tspan x="4608.000000" dy="17.666667">   Underpins many active-passive geo-replication setups.</tspan></text></g><mask id="d2-3241828699" maskUnits="userSpaceOnUse" x="-101" y="-101" width="5080" height="316">
<rect x="-101" y="-101" width="5080" height="316" fill="white"></rect>

</mask></svg></svg>
