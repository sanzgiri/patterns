0000" height="66.000000" rx="10.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="190.500000" y="102.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">ORG STRUCTURE: each client team owns its BFF</text></g><g class="V2ViVGVhbQ=="><g class="shape" ><rect x="441.000000" y="32.000000" width="316.000000" height="130.000000" rx="8.000000" stroke="#0d47a1" fill="#bbdefb" style="stroke-width:2;" /></g><text x="599.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="599.000000" dy="0.000000">WEB TEAM</tspan><tspan x="599.000000" dy="17.000000">u2022 frontend (React/Vue)</tspan><tspan x="599.000000" dy="17.000000">u2022 web BFF (Node/Go)</tspan><tspan x="599.000000" dy="17.000000">u2022 deploys both together</tspan><tspan x="599.000000" dy="17.000000">u2022 controls latency, payload shape</tspan></text></g><g class="TW9iaWxlVGVhbQ=="><g class="shape" ><rect x="817.000000" y="32.000000" width="270.000000" height="130.000000" rx="8.000000" stroke="#1b5e20" fill="#c8e6c9" style="stroke-width:2;" /></g><text x="952.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="952.000000" dy="0.000000">MOBILE TEAM</tspan><tspan x="952.000000" dy="17.000000">u2022 iOS app + Android app</tspan><tspan x="952.000000" dy="17.000000">u2022 mobile BFF (Node/Go)</tspan><tspan x="952.000000" dy="17.000000">u2022 owns offline-sync logic</tspan><tspan x="952.000000" dy="17.000000">u2022 binary protocol decisions</tspan></text></g><g class="UGFydG5lclRlYW0="><g class="shape" ><rect x="1147.000000" y="32.000000" width="264.000000" height="130.000000" rx="8.000000" stroke="#4a148c" fill="#e1bee7" style="stroke-width:2;" /></g><text x="1279.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1279.000000" dy="0.000000">PARTNER / 3rd-PARTY TEAM</tspan><tspan x="1279.000000" dy="17.000000">u2022 partner B2B APIs</tspan><tspan x="1279.000000" dy="17.000000">u2022 partner BFF (Java)</tspan><tspan x="1279.000000" dy="17.000000">u2022 enforces contracts, SLAs</tspan><tspan x="1279.000000" dy="17.000000">u2022 versioning policy</tspan></text></g><g class="Q29yZVRlYW1z"><g class="shape" ><rect x="734.000000" y="294.000000" width="437.000000" height="130.000000" rx="8.000000" stroke="#2e7d32" fill="#a5d6a7" style="stroke-width:2;" /></g><text x="952.500000" y="332.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="952.500000" dy="0.000000">PLATFORM / BACKEND TEAMS</tspan><tspan x="952.500000" dy="17.000000">  Customers svc | Orders svc | Inventory svc | Catalog svc</tspan><tspan x="952.500000" dy="17.000000">  u2022 don&#39;t think about clients</tspan><tspan x="952.500000" dy="17.000000">  u2022 provide stable internal APIs</tspan><tspan x="952.500000" dy="17.000000">  u2022 each owns its own data</tspan></text></g><g class="V2h5"><g class="shape" ><rect x="1471.000000" y="0.000000" width="590.000000" height="194.000000" rx="8.000000" stroke="#e65100" fill="#ffe0b2" style="stroke-width:2;" /></g><text x="1766.000000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1766.000000" dy="0.000000">WHY this ORG SHAPE works (Conway&#39;s Law)</tspan><tspan x="1766.000000" dy="16.555556">  u2022 each client team owns the slice it ships to its users</tspan><tspan x="1766.000000" dy="16.555556">  u2022 changes to mobile experience don&#39;t require coordination with web</tspan><tspan x="1766.000000" dy="16.555556">  u2022 BFF lives in same repo as client u2192 atomic changes possible</tspan><tspan x="1766.000000" dy="16.555556">  u2022 backend teams have STABLE consumers (the BFFs), not 100 features</tspan><tspan x="1766.000000" dy="16.555556">  u2022 partner integrations isolated from internal apps (security, versioning)</tspan><tspan x="1766.000000" dy="16.555556"> </tspan><tspan x="1766.000000" dy="16.555556">ORIGIN: SoundCloud (2015) u2014 &#39;Backends For Frontends&#39; essay by</tspan><tspan x="1766.000000" dy="16.555556">Sam Newman + Phil Calcado, after extracting from one shared API.</tspan></text></g><g class="KFdlYlRlYW0gLSZndDsgQ29yZVRlYW1zKVswXQ=="><marker id="mk-d2-66642794-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#0D32B2" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 599.000000 164.000000 C 599.000000 227.600006 629.599976 254.000000 748.197878 292.757477" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-66642794-3488378134)" mask="url(#d2-66642794)" /></g><g class="KE1vYmlsZVRlYW0gLSZndDsgQ29yZVRlYW1zKVswXQ=="><path d="M 952.000000 164.000000 C 952.000000 227.600006 952.000000 254.000000 952.000000 290.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-66642794-3488378134)" mask="url(#d2-66642794)" /></g><g class="KFBhcnRuZXJUZWFtIC0mZ3Q7IENvcmVUZWFtcylbMF0="><path d="M 1279.000000 164.000000 C 1279.000000 227.600006 1250.599976 254.000000 1140.772941 292.671499" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-66642794-3488378134)" mask="url(#d2-66642794)" /></g><mask id="d2-66642794" maskUnits="userSpaceOnUse" x="-101" y="-101" width="2263" height="626">
