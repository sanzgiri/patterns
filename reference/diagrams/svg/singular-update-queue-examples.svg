t x="0.000000" y="0.000000" width="563.000000" height="162.000000" rx="8.000000" stroke="#0d47a1" fill="#bbdefb" style="stroke-width:2;" /></g><text x="281.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="281.500000" dy="0.000000">RAFT LEADER</tspan><tspan x="281.500000" dy="16.714286">update loop processes one entry at a time</tspan><tspan x="281.500000" dy="16.714286">u2022 single-threaded append to leader log</tspan><tspan x="281.500000" dy="16.714286">u2022 single-threaded commit handling</tspan><tspan x="281.500000" dy="16.714286">u2022 single-threaded apply to state machine</tspan><tspan x="281.500000" dy="16.714286">u2192 zero locks on the log/state</tspan><tspan x="281.500000" dy="16.714286">u2192 fan-out to network is parallel; queue serialization is the bottleneck</tspan></text></g><g class="UmVkaXM="><g class="shape" ><rect x="623.000000" y="0.000000" width="424.000000" height="162.000000" rx="8.000000" stroke="#1b5e20" fill="#c8e6c9" style="stroke-width:2;" /></g><text x="835.000000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="835.000000" dy="0.000000">REDIS (single-threaded core)</tspan><tspan x="835.000000" dy="16.714286">all commands processed by ONE thread on a queue</tspan><tspan x="835.000000" dy="16.714286">u2022 multiplexed network I/O (epoll/kqueue)</tspan><tspan x="835.000000" dy="16.714286">u2022 commands queued, executed serially</tspan><tspan x="835.000000" dy="16.714286">u2022 no GIL/lock concerns inside the main loop</tspan><tspan x="835.000000" dy="16.714286">u2192 millions of QPS on a single CPU core</tspan><tspan x="835.000000" dy="16.714286">u2192 simpler reasoning than concurrent Memcached</tspan></text></g><g class="Tm9kZQ=="><g class="shape" ><rect x="1107.000000" y="8.000000" width="359.000000" height="146.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="1286.500000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1286.500000" dy="0.000000">NODE.JS EVENT LOOP</tspan><tspan x="1286.500000" dy="16.833333">entire user code runs on one thread</tspan><tspan x="1286.500000" dy="16.833333">u2022 I/O handled by background pool</tspan><tspan x="1286.500000" dy="16.833333">u2022 callbacks queued, executed serially</tspan><tspan x="1286.500000" dy="16.833333">u2022 if you need concurrency, fork workers</tspan><tspan x="1286.500000" dy="16.833333">u2192 no locks in user code, naturally serial</tspan></text></g><g class="QWN0b3I="><g class="shape" ><rect x="1526.000000" y="8.000000" width="423.000000" height="146.000000" rx="8.000000" stroke="#4a148c" fill="#e1bee7" style="stroke-width:2;" /></g><text x="1737.500000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1737.500000" dy="0.000000">ACTOR MODEL (Akka, Erlang/OTP, Orleans)</tspan><tspan x="1737.500000" dy="16.833333">each actor has a mailbox queue</tspan><tspan x="1737.500000" dy="16.833333">u2022 messages dequeued one at a time</tspan><tspan x="1737.500000" dy="16.833333">u2022 actor&#39;s state never accessed concurrently</tspan><tspan x="1737.500000" dy="16.833333">u2192 &#39;singular update queue&#39; per actor</tspan><tspan x="1737.500000" dy="16.833333">u2192 thousands of actors, each independently serial</tspan></text></g><g class="TE1BWA=="><g class="shape" ><rect x="2009.000000" y="16.000000" width="503.000000" height="130.000000" rx="8.000000" stroke="#37474f" fill="#cfd8dc" style="stroke-width:2;" /></g><text x="2260.500000" y="54.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="2260.500000" dy="0.000000">LMAX DISRUPTOR</tspan><tspan x="2260.500000" dy="17.000000">special single-writer ring buffer</tspan><tspan x="2260.500000" dy="17.000000">u2022 lock-free producer / single consumer</tspan><tspan x="2260.500000" dy="17.000000">u2022 6M+ events/sec single-threaded</tspan><tspan x="2260.500000" dy="17.000000">u2192 the LMAX trading platform&#39;s whole order book on one core</tspan></text></g><g class="U2N5bGxhREI="><g class="shape" ><rect x="2572.000000" y="8.000000" width="364.000000" height="146.000000" rx="8.000000" stroke="#263238" fill="#b0bec5" style="stroke-width:2;" /></g><text x="2754.000000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="2754.000000" dy="0.000000">SCYLLA DB / SEASTAR</tspan><tspan x="2754.000000" dy="16.833333">shared-nothing per-core architecture</tspan><tspan x="2754.000000" dy="16.833333">u2022 each core owns a partition of data</tspan><tspan x="2754.000000" dy="16.833333">u2022 cross-core via explicit message queues</tspan><tspan x="2754.000000" dy="16.833333">u2192 singular update queue PER CORE</tspan><tspan x="2754.000000" dy="16.833333">u2192 NUMA-friendly, near-linear scaling</tspan></text></g><mask id="d2-1087264198" maskUnits="userSpaceOnUse" x="-101" y="-101" width="3138" height="364">
