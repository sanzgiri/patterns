		.d2-2478253529 .color-AB5{color:#F7F8FE;}.appendix text.text{fill:#0A0F25}.md{--color-fg-default:#0A0F25;--color-fg-muted:#676C7E;--color-fg-subtle:#9499AB;--color-canvas-default:#FFFFFF;--color-canvas-subtle:#EEF1F8;--color-border-default:#0D32B2;--color-border-muted:#0D32B2;--color-neutral-muted:#EEF1F8;--color-accent-fg:#0D32B2;--color-accent-emphasis:#0D32B2;--color-attention-subtle:#676C7E;--color-danger-fg:red;}.sketch-overlay-B1{fill:url(#streaks-darker-d2-2478253529);mix-blend-mode:lighten}.sketch-overlay-B2{fill:url(#streaks-darker-d2-2478253529);mix-blend-mode:lighten}.sketch-overlay-B3{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-B4{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-B5{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-B6{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-AA2{fill:url(#streaks-dark-d2-2478253529);mix-blend-mode:overlay}.sketch-overlay-AA4{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-AA5{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-AB4{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-AB5{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-N1{fill:url(#streaks-darker-d2-2478253529);mix-blend-mode:lighten}.sketch-overlay-N2{fill:url(#streaks-dark-d2-2478253529);mix-blend-mode:overlay}.sketch-overlay-N3{fill:url(#streaks-normal-d2-2478253529);mix-blend-mode:color-burn}.sketch-overlay-N4{fill:url(#streaks-normal-d2-2478253529);mix-blend-mode:color-burn}.sketch-overlay-N5{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-N6{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.sketch-overlay-N7{fill:url(#streaks-bright-d2-2478253529);mix-blend-mode:darken}.light-code{display: block}.dark-code{display: none}]]></style><g class="VUMx"><g class="shape" ><rect x="0.000000" y="0.000000" width="583.000000" height="178.000000" rx="8.000000" stroke="#0d47a1" fill="#bbdefb" style="stroke-width:2;" /></g><text x="291.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="291.500000" dy="0.000000">1. SERVICE-MESH PROXY (Envoy/Linkerd sidecar)</tspan><tspan x="291.500000" dy="16.625000">   ALL inbound + outbound traffic goes through the sidecar:</tspan><tspan x="291.500000" dy="16.625000">     u2022 mTLS termination</tspan><tspan x="291.500000" dy="16.625000">     u2022 retries, timeouts, circuit breakers</tspan><tspan x="291.500000" dy="16.625000">     u2022 traffic splitting (canary, blue/green)</tspan><tspan x="291.500000" dy="16.625000">     u2022 observability (metrics, traces of every call)</tspan><tspan x="291.500000" dy="16.625000">     u2022 access policy</tspan><tspan x="291.500000" dy="16.625000">   u2192 the dominant sidecar use case today (Istio, Linkerd, Consul Connect)</tspan></text></g><g class="VUMy"><g class="shape" ><rect x="643.000000" y="32.000000" width="456.000000" height="114.000000" rx="8.000000" stroke="#1b5e20" fill="#c8e6c9" style="stroke-width:2;" /></g><text x="871.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="871.000000" dy="0.000000">2. LOG SHIPPING (Fluent Bit, Vector, Filebeat sidecar)</tspan><tspan x="871.000000" dy="17.250000">   App writes logs to a shared volume.</tspan><tspan x="871.000000" dy="17.250000">   Sidecar tails them, parses, ships to ELK / Loki / Datadog.</tspan><tspan x="871.000000" dy="17.250000">   u2192 app doesn&#39;t need to know about log infrastructure</tspan></text></g><g class="VUMz"><g class="shape" ><rect x="1159.000000" y="24.000000" width="503.000000" height="130.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="1410.500000" y="62.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1410.500000" dy="0.000000">3. SECRET INJECTION (Vault Agent sidecar)</tspan><tspan x="1410.500000" dy="17.000000">   Sidecar authenticates to Vault, fetches secrets,</tspan><tspan x="1410.500000" dy="17.000000">   renders them to disk for the app to read.</tspan><tspan x="1410.500000" dy="17.000000">   Rotates them on schedule.</tspan><tspan x="1410.500000" dy="17.000000">   u2192 app reads from a file; secret lifecycle is sidecar&#39;s problem</tspan></text></g><g class="VUM0"><g class="shape" ><rect x="1722.000000" y="40.000000" width="510.000000" height="98.000000" rx="8.000000" stroke="#4a148c" fill="#e1bee7" style="stroke-width:2;" /></g><text x="1977.000000" y="78.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1977.000000" dy="0.000000">4. CONFIG SYNC (Consul Template, configMap reloader)</tspan><tspan x="1977.000000" dy="17.666667">   Sidecar watches remote config, writes file, sends SIGHUP to app.</tspan><tspan x="1977.000000" dy="17.666667">   u2192 hot config reload without restart</tspan></text></g><g class="VUM1"><g class="shape" ><rect x="2292.000000" y="32.000000" width="474.000000" height="114.000000" rx="8.000000" stroke="#3e2723" fill="#d7ccc8" style="stroke-width:2;" /></g><text x="2529.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="2529.000000" dy="0.000000">5. METRICS SCRAPER + EXPORTER</tspan><tspan x="2529.000000" dy="17.250000">   Sidecar exposes /metrics in Prometheus format, even if app</tspan><tspan x="2529.000000" dy="17.250000">   uses a non-Prom format (statsd, custom).</tspan><tspan x="2529.000000" dy="17.250000">   u2192 app can be metric-protocol-agnostic</tspan></text></g><g class="VUM2"><g class="shape" ><rect x="2826.000000" y="32.000000" width="548.000000" height="114.000000" rx="8.000000" stroke="#e65100" fill="#ffe0b2" style="stroke-width:2;" /></g><text x="3100.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="3100.000000" dy="0.000000">6. PROTOCOL TRANSLATION (Ambassador-style sidecar)</tspan><tspan x="3100.000000" dy="17.250000">   App speaks REST; world speaks gRPC.</tspan><tspan x="3100.000000" dy="17.250000">   Sidecar translates both ways.</tspan><tspan x="3100.000000" dy="17.250000">   u2192 see also: Ambassador pattern (essentially a specialized sidecar)</tspan></text></g><g class="VUM3"><g class="shape" ><rect x="3434.000000" y="32.000000" width="498.000000" height="114.000000" rx="8.000000" stroke="#004d40" fill="#b2dfdb" style="stroke-width:2;" /></g><text x="3683.000000" y="70.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="3683.000000" dy="0.000000">7. CACHE WARMER / LOCAL CACHE</tspan><tspan x="3683.000000" dy="17.250000">   Sidecar pre-loads &amp; refreshes a local cache (Redis, in-memory).</tspan><tspan x="3683.000000" dy="17.250000">   App reads cache from sidecar via localhost.</tspan><tspan x="3683.000000" dy="17.250000">   u2192 used by some content-delivery and ad-bidding stacks</tspan></text></g><mask id="d2-2478253529" maskUnits="userSpaceOnUse" x="-101" y="-101" width="4134" height="380">
<rect x="-101" y="-101" width="4134" height="380" fill="white"></rect>

</mask></svg></svg>
