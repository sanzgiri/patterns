		.d2-1532106535 .color-AB5{color:#F7F8FE;}.appendix text.text{fill:#0A0F25}.md{--color-fg-default:#0A0F25;--color-fg-muted:#676C7E;--color-fg-subtle:#9499AB;--color-canvas-default:#FFFFFF;--color-canvas-subtle:#EEF1F8;--color-border-default:#0D32B2;--color-border-muted:#0D32B2;--color-neutral-muted:#EEF1F8;--color-accent-fg:#0D32B2;--color-accent-emphasis:#0D32B2;--color-attention-subtle:#676C7E;--color-danger-fg:red;}.sketch-overlay-B1{fill:url(#streaks-darker-d2-1532106535);mix-blend-mode:lighten}.sketch-overlay-B2{fill:url(#streaks-darker-d2-1532106535);mix-blend-mode:lighten}.sketch-overlay-B3{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-B4{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-B5{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-B6{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-AA2{fill:url(#streaks-dark-d2-1532106535);mix-blend-mode:overlay}.sketch-overlay-AA4{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-AA5{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-AB4{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-AB5{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-N1{fill:url(#streaks-darker-d2-1532106535);mix-blend-mode:lighten}.sketch-overlay-N2{fill:url(#streaks-dark-d2-1532106535);mix-blend-mode:overlay}.sketch-overlay-N3{fill:url(#streaks-normal-d2-1532106535);mix-blend-mode:color-burn}.sketch-overlay-N4{fill:url(#streaks-normal-d2-1532106535);mix-blend-mode:color-burn}.sketch-overlay-N5{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-N6{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.sketch-overlay-N7{fill:url(#streaks-bright-d2-1532106535);mix-blend-mode:darken}.light-code{display: block}.dark-code{display: none}]]></style><g class="VGl0bGU="><g class="shape" ><rect x="900.000000" y="0.000000" width="481.000000" height="66.000000" rx="10.000000" stroke="#b71c1c" fill="#ffcdd2" style="stroke-width:2;" /></g><text x="1140.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px">WHAT GOES WRONG WITH CACHE-ASIDE (and how to mitigate)</text></g><g class="U3RhbGU="><g class="shape" ><rect x="0.000000" y="166.000000" width="578.000000" height="194.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="289.000000" y="204.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="289.000000" dy="0.000000">1. STALE READS during the small window between</tspan><tspan x="289.000000" dy="16.555556">   DB write and cache invalidation</tspan><tspan x="289.000000" dy="16.555556"> </tspan><tspan x="289.000000" dy="16.555556">   T0: ReaderA  GET key u2192 MISS u2192 SELECT u2192 (in-flight: value=v1)</tspan><tspan x="289.000000" dy="16.555556">   T1: Writer   UPDATE row to v2; DELETE cache key</tspan><tspan x="289.000000" dy="16.555556">   T2: ReaderA  SET key=v1   u2190 OOPS, just wrote stale value!</tspan><tspan x="289.000000" dy="16.555556"> </tspan><tspan x="289.000000" dy="16.555556">   FIX: small TTL bounds the damage; or use versioned keys;</tspan><tspan x="289.000000" dy="16.555556">        or a separate invalidation log; or write-through</tspan></text></g><g class="U3RhbXBlZGU="><g class="shape" ><rect x="638.000000" y="190.000000" width="477.000000" height="146.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="876.500000" y="228.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="876.500000" dy="0.000000">2. CACHE STAMPEDE (thundering herd)</tspan><tspan x="876.500000" dy="16.833333">   Hot key TTL expires; 1000 requests all MISS at once;</tspan><tspan x="876.500000" dy="16.833333">   1000 concurrent SELECTs slam the DB.</tspan><tspan x="876.500000" dy="16.833333"> </tspan><tspan x="876.500000" dy="16.833333">   FIX: single-flight (one request fetches, others wait);</tspan><tspan x="876.500000" dy="16.833333">        probabilistic early expiration; locking; request coalescing</tspan></text></g><g class="TmVnYXRpdmU="><g class="shape" ><rect x="1175.000000" y="182.000000" width="458.000000" height="162.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="1404.000000" y="220.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1404.000000" dy="0.000000">3. NEGATIVE CACHING / KEY ENUMERATION</tspan><tspan x="1404.000000" dy="16.714286">   Attacker requests 1M random IDs that don&#39;t exist.</tspan><tspan x="1404.000000" dy="16.714286">   Each request MISSes cache, SELECTs DB, returns nothing.</tspan><tspan x="1404.000000" dy="16.714286">   DB is overwhelmed by misses.</tspan><tspan x="1404.000000" dy="16.714286"> </tspan><tspan x="1404.000000" dy="16.714286">   FIX: cache the &#39;not found&#39; result too (short TTL);</tspan><tspan x="1404.000000" dy="16.714286">        Bloom filter to short-circuit known-absent keys</tspan></text></g><g class="SW5jb25zaXN0ZW5jeQ=="><g class="shape" ><rect x="1693.000000" y="182.000000" width="605.000000" height="162.000000" rx="8.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="1995.500000" y="220.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="1995.500000" dy="0.000000">4. DUAL-WRITE INCONSISTENCY</tspan><tspan x="1995.500000" dy="16.714286">   Crash between &#39;UPDATE DB&#39; and &#39;DELETE cache&#39; u2192 cache holds stale value</tspan><tspan x="1995.500000" dy="16.714286">   until TTL expires (could be hours).</tspan><tspan x="1995.500000" dy="16.714286"> </tspan><tspan x="1995.500000" dy="16.714286">   FIX: TTL bound + accept eventual consistency;</tspan><tspan x="1995.500000" dy="16.714286">        or use CDC on the DB to drive invalidations;</tspan><tspan x="1995.500000" dy="16.714286">        or switch to write-through (cache + DB updated atomically)</tspan></text></g><g class="KFRpdGxlIC0mZ3Q7IFN0YWxlKVswXQ=="><marker id="mk-d2-1532106535-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#0D32B2" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 897.759440 56.643087 C 411.149994 104.088997 289.000000 126.000000 289.000000 162.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1532106535-3488378134)" mask="url(#d2-1532106535)" /></g><g class="KFRpdGxlIC0mZ3Q7IFN0YW1wZWRlKVswXQ=="><path d="M 1033.592111 66.599965 C 908.299988 106.000000 876.500000 130.800003 876.500000 186.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1532106535-3488378134)" mask="url(#d2-1532106535)" /></g><g class="KFRpdGxlIC0mZ3Q7IE5lZ2F0aXZlKVswXQ=="><path d="M 1246.907889 66.599965 C 1372.199951 106.000000 1404.000000 129.199005 1404.000000 178.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1532106535-3488378134)" mask="url(#d2-1532106535)" /></g><g class="KFRpdGxlIC0mZ3Q7IEluY29uc2lzdGVuY3kpWzBd"><path d="M 1382.490549 56.194200 C 1872.500000 104.000000 1995.500000 129.199005 1995.500000 178.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-1532106535-3488378134)" mask="url(#d2-1532106535)" /></g><mask id="d2-1532106535" maskUnits="userSpaceOnUse" x="-101" y="-101" width="2500" height="562">
