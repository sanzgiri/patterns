000" width="259.000000" height="98.000000" rx="10.000000" stroke="#1b5e20" fill="#c8e6c9" style="stroke-width:2;" /></g><text x="129.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="129.500000" dy="0.000000">Rule 1: LOCAL EVENT</tspan><tspan x="129.500000" dy="17.666667">T = T + 1</tspan><tspan x="129.500000" dy="17.666667">(before / after any local event)</tspan></text></g><g class="UjI="><g class="shape" ><rect x="319.000000" y="0.000000" width="253.000000" height="98.000000" rx="10.000000" stroke="#0d47a1" fill="#bbdefb" style="stroke-width:2;" /></g><text x="445.500000" y="38.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="445.500000" dy="0.000000">Rule 2: SEND MESSAGE</tspan><tspan x="445.500000" dy="17.666667">T = T + 1</tspan><tspan x="445.500000" dy="17.666667">attach T to outgoing message</tspan></text></g><g class="UjM="><g class="shape" ><rect x="632.000000" y="8.000000" width="225.000000" height="82.000000" rx="10.000000" stroke="#bf360c" fill="#fff4c2" style="stroke-width:2;" /></g><text x="744.500000" y="46.500000" fill="#0A0F25" class="text-bold fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="744.500000" dy="0.000000">Rule 3: RECEIVE MESSAGE</tspan><tspan x="744.500000" dy="18.500000">T = max(T, T_msg) + 1</tspan></text></g><g class="UHJvcGVydHk="><g class="shape" ><rect x="257.000000" y="198.000000" width="377.000000" height="162.000000" rx="10.000000" stroke="#4a148c" fill="#f3e5f5" style="stroke-width:2;" /></g><text x="445.500000" y="236.500000" fill="#311b92" class="text-bold" style="text-anchor:middle;font-size:16px"><tspan x="445.500000" dy="0.000000">Property guaranteed:</tspan><tspan x="445.500000" dy="16.714286">if event A happens-before event B,</tspan><tspan x="445.500000" dy="16.714286">then  T(A) &lt; T(B)</tspan><tspan x="445.500000" dy="16.714286"> </tspan><tspan x="445.500000" dy="16.714286">But NOT the reverse:</tspan><tspan x="445.500000" dy="16.714286">T(A) &lt; T(B) does NOT imply A happens-before B.</tspan><tspan x="445.500000" dy="16.714286">(They could be concurrent.)</tspan></text></g><g class="KFIxIC0mZ3Q7IFByb3BlcnR5KVswXQ=="><marker id="mk-d2-292497324-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#0D32B2" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 129.500000 100.000000 C 129.500000 138.000000 155.100006 158.600006 253.804284 199.469743" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-292497324-3488378134)" mask="url(#d2-292497324)" /></g><g class="KFIyIC0mZ3Q7IFByb3BlcnR5KVswXQ=="><path d="M 445.500000 100.000000 C 445.500000 138.000000 445.500000 158.000000 445.500000 194.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-292497324-3488378134)" mask="url(#d2-292497324)" /></g><g class="KFIzIC0mZ3Q7IFByb3BlcnR5KVswXQ=="><path d="M 744.500000 92.000000 C 744.500000 136.399994 721.700012 158.000000 634.163153 196.393354" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-292497324-3488378134)" mask="url(#d2-292497324)" /></g><mask id="d2-292497324" maskUnits="userSpaceOnUse" x="-101" y="-101" width="1059" height="562">
