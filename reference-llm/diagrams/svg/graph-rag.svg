		.d2-2481903522 .color-AB5{color:#F7F8FE;}.appendix text.text{fill:#0A0F25}.md{--color-fg-default:#0A0F25;--color-fg-muted:#676C7E;--color-fg-subtle:#9499AB;--color-canvas-default:#FFFFFF;--color-canvas-subtle:#EEF1F8;--color-border-default:#0D32B2;--color-border-muted:#0D32B2;--color-neutral-muted:#EEF1F8;--color-accent-fg:#0D32B2;--color-accent-emphasis:#0D32B2;--color-attention-subtle:#676C7E;--color-danger-fg:red;}.sketch-overlay-B1{fill:url(#streaks-darker-d2-2481903522);mix-blend-mode:lighten}.sketch-overlay-B2{fill:url(#streaks-darker-d2-2481903522);mix-blend-mode:lighten}.sketch-overlay-B3{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-B4{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-B5{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-B6{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-AA2{fill:url(#streaks-dark-d2-2481903522);mix-blend-mode:overlay}.sketch-overlay-AA4{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-AA5{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-AB4{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-AB5{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-N1{fill:url(#streaks-darker-d2-2481903522);mix-blend-mode:lighten}.sketch-overlay-N2{fill:url(#streaks-dark-d2-2481903522);mix-blend-mode:overlay}.sketch-overlay-N3{fill:url(#streaks-normal-d2-2481903522);mix-blend-mode:color-burn}.sketch-overlay-N4{fill:url(#streaks-normal-d2-2481903522);mix-blend-mode:color-burn}.sketch-overlay-N5{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-N6{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.sketch-overlay-N7{fill:url(#streaks-bright-d2-2481903522);mix-blend-mode:darken}.light-code{display: block}.dark-code{display: none}]]></style><g class="aW5kZXhpbmc="><g class="shape" ><rect x="46.000000" y="20.000000" width="492.000000" height="177.000000" stroke="#2563eb" fill="#dbeafe" style="stroke-width:2;" /></g><text x="292.000000" y="7.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:28px">INDEXING (build the graph)</text></g><g class="cXVlcnlpbmc="><g class="shape" ><rect x="67.000000" y="337.000000" width="450.000000" height="177.000000" stroke="#d97706" fill="#fef3c7" style="stroke-width:2;" /></g><text x="292.000000" y="324.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:28px">QUERYING (two modes)</text></g><g class="dnNCYXNpYw=="><g class="shape" ><rect x="99.000000" y="654.000000" width="386.000000" height="209.000000" stroke="#db2777" fill="#fbcfe8" style="stroke-width:2;" /></g><text x="292.000000" y="641.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:28px">vs Basic RAG</text></g><g class="Y29zdA=="><g class="shape" ><rect x="10.000000" y="1003.000000" width="563.000000" height="145.000000" stroke="#dc2626" fill="#fee2e2" style="stroke-width:2;" /></g><text x="291.500000" y="990.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:28px">COST (the catch)</text></g><g class="aW5kZXhpbmcuYm9keQ=="><g class="shape" ></g><text x="292.000000" y="66.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="292.000000" dy="0.000000">1. Chunk docs</tspan><tspan x="292.000000" dy="16.714286">2. LLM extracts entities + relationships per chunk</tspan><tspan x="292.000000" dy="16.714286">   (ACME Corp HAS_CEO Jane Doe; Jane Doe REPORTS_TO Board)</tspan><tspan x="292.000000" dy="16.714286">3. Build knowledge graph (nodes = entities, edges = relations)</tspan><tspan x="292.000000" dy="16.714286">4. Run community detection (Leiden algorithm)</tspan><tspan x="292.000000" dy="16.714286">5. LLM generates per-community SUMMARIES at multiple levels</tspan><tspan x="292.000000" dy="16.714286">   (whole graph -&gt; sub-communities -&gt; leaf entities)</tspan></text></g><g class="cXVlcnlpbmcuYm9keQ=="><g class="shape" ></g><text x="292.000000" y="383.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="292.000000" dy="0.000000">LOCAL search: &#39;who is the CEO of ACME?&#39;</tspan><tspan x="292.000000" dy="16.714286">  -&gt; entity lookup -&gt; nearby graph traversal -&gt; chunks</tspan><tspan x="292.000000" dy="16.714286"> </tspan><tspan x="292.000000" dy="16.714286">GLOBAL search: &#39;what are the main themes in this corpus?&#39;</tspan><tspan x="292.000000" dy="16.714286">  -&gt; use community summaries (already-LLM-generated)</tspan><tspan x="292.000000" dy="16.714286">  -&gt; map-reduce over summaries</tspan><tspan x="292.000000" dy="16.714286">  -&gt; final answer assembled from summary outputs</tspan></text></g><g class="dnNCYXNpYy5ib2R5"><g class="shape" ></g><text x="292.000000" y="700.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="292.000000" dy="0.000000">Basic RAG: vector similarity on chunks.</tspan><tspan x="292.000000" dy="16.555556">  Good at: &#39;what does it say about X?&#39;</tspan><tspan x="292.000000" dy="16.555556">  Bad at:  &#39;what are the main themes?&#39;</tspan><tspan x="292.000000" dy="16.555556">           &#39;how is X connected to Y?&#39;</tspan><tspan x="292.000000" dy="16.555556">           multi-hop questions.</tspan><tspan x="292.000000" dy="16.555556"> </tspan><tspan x="292.000000" dy="16.555556">GraphRAG: structural traversal + LLM summaries.</tspan><tspan x="292.000000" dy="16.555556">  Better at: aggregation, relationships, themes.</tspan><tspan x="292.000000" dy="16.555556">  Worse at: cost, indexing time, simple lookups.</tspan></text></g><g class="Y29zdC5ib2R5"><g class="shape" ></g><text x="291.500000" y="1049.000000" fill="#0A0F25" class="text fill-N1" style="text-anchor:middle;font-size:16px"><tspan x="291.500000" dy="0.000000">Indexing: O(corpus size) LLM calls for entity extraction</tspan><tspan x="291.500000" dy="17.000000">         + O(communities) LLM calls for summaries.</tspan><tspan x="291.500000" dy="17.000000">For a moderate corpus: 100x-1000x more expensive than basic RAG to build.</tspan><tspan x="291.500000" dy="17.000000">Query cost: similar to basic RAG.</tspan><tspan x="291.500000" dy="17.000000">Best for: high-value, stable corpora (research, legal, intel).</tspan></text></g><g class="KGluZGV4aW5nIC0mZ3Q7IHF1ZXJ5aW5nKVswXQ=="><marker id="mk-d2-2481903522-3488378134" markerWidth="10.000000" markerHeight="12.000000" refX="7.000000" refY="6.000000" viewBox="0.000000 0.000000 10.000000 12.000000" orient="auto" markerUnits="userSpaceOnUse"> <polygon points="0.000000,0.000000 10.000000,6.000000 0.000000,12.000000" fill="#0D32B2" class="connection fill-B1" stroke-width="2" /> </marker><path d="M 291.500000 199.000000 C 291.500000 253.000000 291.500000 272.799988 291.500000 292.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-2481903522-3488378134)" mask="url(#d2-2481903522)" /></g><g class="KHF1ZXJ5aW5nIC0mZ3Q7IHZzQmFzaWMpWzBd"><path d="M 291.500000 516.000000 C 291.500000 570.000000 291.500000 589.799988 291.500000 609.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-2481903522-3488378134)" mask="url(#d2-2481903522)" /></g><g class="KHZzQmFzaWMgLSZndDsgY29zdClbMF0="><path d="M 291.500000 865.000000 C 291.500000 919.000000 291.500000 938.799988 291.500000 958.000000" stroke="#0D32B2" fill="none" class="connection stroke-B1" style="stroke-width:2;" marker-end="url(#mk-d2-2481903522-3488378134)" mask="url(#d2-2481903522)" /></g><mask id="d2-2481903522" maskUnits="userSpaceOnUse" x="-91" y="-121" width="765" height="1370">
